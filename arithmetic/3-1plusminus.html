<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등 3학년 세로셈 연습 (전자칠판용)</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@500;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        /* Base / CSS Reset */
        * {
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f4f0ec;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* Neo Brutalism UI Component */
        .btn {
            background-color: #fff;
            border: 4px solid #000;
            box-shadow: 6px 6px 0px #000;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: 'Jua', sans-serif;
            cursor: pointer;
            border-radius: 0;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #000;
        }

        /* Form inputs Neo Brutalism */
        .custom-select {
            appearance: none;
            background-color: #fff;
            border: 4px solid #000;
            box-shadow: 6px 6px 0px #000;
            padding: 20px 50px 20px 20px;
            font-size: 1.8rem;
            font-family: 'Jua', sans-serif;
            border-radius: 0;
            cursor: pointer;
            width: 100%;
            max-width: 500px;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 25px;
        }

        .custom-select:focus {
            outline: none;
            background-color: #fcf140;
        }

        /* Color Palettes */
        .btn-yellow {
            background-color: #fcf140;
        }

        .btn-pink {
            background-color: #ffb1c0;
        }

        .btn-blue {
            background-color: #a8d5ff;
        }

        .btn-green {
            background-color: #a0f4a0;
        }

        .btn-cyan {
            background-color: #6ceaea;
        }

        .hidden {
            display: none !important;
        }

        /* Menu Screen */
        #menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            gap: 50px;
            overflow-y: auto;
            touch-action: auto;
        }

        h1 {
            font-family: 'Jua', sans-serif;
            font-size: 4rem;
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
            margin-top: 0;
            text-align: center;
        }

        .section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .section-title {
            font-size: 2.2rem;
            font-family: 'Jua', sans-serif;
            border-bottom: 6px solid #000;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        #start-btn {
            font-size: 3rem;
            padding: 25px 100px;
            margin-top: 30px;
            letter-spacing: 5px;
        }

        /* App Screen */
        #app-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            background-color: #e0e0e0;
        }

        /* Top Navigation */
        #top-bar {
            height: 80px;
            background-color: #fff;
            border-bottom: 6px solid #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
        }

        #top-bar .title {
            font-size: 2.5rem;
            font-family: 'Jua', sans-serif;
        }

        #top-bar .btn {
            padding: 10px 25px;
            font-size: 1.5rem;
        }

        /* Grid Layout - ONLY VERTICAL SPLITS */
        #grid-container {
            flex: 1;
            display: flex;
            gap: 10px;
            background-color: #000;
            border: 10px solid #000;
            position: relative;
        }

        .pane {
            flex: 1;
            background-color: #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Pane Top Tools (New Problem) */
        .pane-tools-top {
            pointer-events: auto;
            /* Enable clicking because parent is pointer-events: none */
            margin-bottom: 70px;
            /* Space for writing carryovers */
            z-index: 30;
        }

        .pane-tools-top .btn {
            padding: 8px 18px;
            font-size: 1.2rem;
            border-radius: 50px;
            border-width: 3px;
            box-shadow: 4px 4px 0px #000;
        }

        /* Pane Bottom Tools (Slider & Eraser in one row) */
        .pane-tools-bottom {
            position: absolute;
            bottom: 0px;
            z-index: 30;
            width: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-top: 4px solid #000;
        }

        .pane-tools-bottom .btn-eraser {
            padding: 8px 15px;
            font-size: 1.2rem;
            border-radius: 50px;
            border-width: 3px;
            white-space: nowrap;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .btn-eraser.eraser-active {
            background-color: #000 !important;
            color: #fff !important;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Jua', sans-serif;
            font-size: 1.2rem;
            flex: 1 1 auto;
            min-width: 0;
            /* allows flex item to shrink below content size */
        }

        .slider-container span {
            white-space: nowrap;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 8px;
            accent-color: #000;
            cursor: pointer;
            min-width: 30px;
        }

        /* Math Problem Text Area */
        .math-wrapper {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 25;
            /* Above canvas (20) so button can be clicked */
            pointer-events: none;
            transition: top 0.1s;
        }

        .math-problem {
            font-family: 'Chivo Mono', monospace;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            line-height: 1.1;
            user-select: none;
            color: #111;
        }

        /* Force monospace spans for exact digit alignment */
        .num-row {
            display: flex;
            justify-content: flex-end;
            width: 100%;
        }

        .operator {
            width: 1.5em;
            text-align: center;
        }

        .invisible {
            visibility: hidden;
        }

        .digit {
            width: 1.1em;
            text-align: center;
        }

        .line {
            border-bottom: 0.15em solid #000;
            width: 100%;
            margin: 5px 0 15px 0;
        }

        /* Responsive math font sizes based on split count */
        /* Since width varies dramatically by split, we use container queries or vw, but fixed based on splits is safer */
        .split-1 .math-problem {
            font-size: 8vw;
            max-width: 400px;
            font-size: min(8vw, 150px);
            /* Limit absolute maximum size */
        }

        /* Limit the width of the bottom tools on 1-split so they don't look comically large */
        .split-1 .pane-tools-bottom {
            justify-content: center;
            gap: 50px;
        }

        .split-1 .slider-container {
            flex: 0 1 400px;
        }

        .split-2 .math-problem {
            font-size: 5vw;
        }

        .split-3 .math-problem {
            font-size: 4vw;
        }

        .split-4 .math-problem {
            font-size: 3vw;
        }

        .split-5 .math-problem {
            font-size: 2.5vw;
            /* Adjust bottom row for very tight spaces */
        }

        .split-5 .pane-tools-bottom,
        .split-6 .pane-tools-bottom {
            padding: 5px 10px;
            gap: 5px;
        }

        .split-5 .slider-container,
        .split-6 .slider-container {
            font-size: 0.9rem;
            gap: 5px;
        }

        .split-5 .pane-tools-bottom .btn-eraser,
        .split-6 .pane-tools-bottom .btn-eraser {
            padding: 5px 10px;
            font-size: 1rem;
            border-width: 2px;
        }

        .split-6 .math-problem {
            font-size: 2.2vw;
        }

        /* Interactive layer */
        .drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            touch-action: none;
        }
    </style>
</head>

<body class="split-1">
    <!-- 1. Menu Screen -->
    <div id="menu-screen">
        <h1>🔢 3학년 1학기 1. 덧셈과 뺄셈 연습 📝</h1>

        <div class="section">
            <div class="section-title">1. 문제 유형 세팅</div>
            <select id="type-select" class="custom-select">
                <option value="1">받아올림 없는 덧셈</option>
                <option value="2">받아올림 한 번 덧셈</option>
                <option value="3">받아올림 두 번 덧셈</option>
                <option value="4">받아내림 없는 뺄셈</option>
                <option value="5">받아내림 있는 뺄셈</option>
            </select>
        </div>

        <div class="section">
            <div class="section-title">2. 화면 분할 세팅 (동시 참여자 수)</div>
            <select id="split-select" class="custom-select">
                <option value="1">1명 (1분할)</option>
                <option value="2">2명 (2분할)</option>
                <option value="3">3명 (3분할)</option>
                <option value="4">4명 (4분할)</option>
                <option value="5">5명 (5분할)</option>
                <option value="6">6명 (6분할)</option>
            </select>
        </div>

        <button id="start-btn" class="btn btn-green">시작하기</button>
    </div>

    <!-- 2. App Screen -->
    <div id="app-screen">
        <div id="top-bar">
            <div class="title" id="app-title">받아올림 없는 덧셈</div>
            <button class="btn btn-pink" id="btn-back">⬅ 처음으로</button>
        </div>

        <div id="grid-container">
            <!-- Panes will be injected here -->
        </div>
    </div>

    <script>
        // --- 1. State Management --- //
        const STATE = {
            type: 1,
            splits: 1
        };

        // --- 2. Menu Interactions --- //
        document.getElementById('start-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            STATE.type = parseInt(document.getElementById('type-select').value);
            STATE.splits = parseInt(document.getElementById('split-select').value);

            document.body.className = `split-${STATE.splits}`;

            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('app-screen').style.display = 'flex';

            const dropdown = document.getElementById('type-select');
            document.getElementById('app-title').innerText = dropdown.options[dropdown.selectedIndex].text;
            initGrid();
        });

        document.getElementById('btn-back').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('menu-screen').classList.remove('hidden');
            document.body.className = '';
        });

        // --- 3. Math Generator --- //
        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateMath(type) {
            let a, b, op;
            if (type === 1) { // 1. 받아올림 없는 덧셈
                let h1 = randomInt(1, 8), t1 = randomInt(0, 9), o1 = randomInt(0, 9);
                let h2 = randomInt(1, 9 - h1), t2 = randomInt(0, 9 - t1), o2 = randomInt(0, 9 - o1);
                a = parseInt(`${h1}${t1}${o1}`);
                b = parseInt(`${h2}${t2}${o2}`);
                op = '+';
            } else if (type === 2) { // 2. 받아올림 1번 상위 덧셈
                let isOnesCarry = Math.random() < 0.5;
                let h1, h2, t1, t2, o1, o2;
                if (isOnesCarry) {
                    o1 = randomInt(1, 9); o2 = randomInt(10 - o1, 9);
                    t1 = randomInt(0, 8); t2 = randomInt(0, 8 - t1);
                    h1 = randomInt(1, 8); h2 = randomInt(1, 9 - h1);
                } else {
                    o1 = randomInt(0, 9); o2 = randomInt(0, 9 - o1);
                    t1 = randomInt(1, 9); t2 = randomInt(10 - t1, 9);
                    h1 = randomInt(1, 8); h2 = randomInt(1, 8 - h1);
                }
                a = parseInt(`${h1}${t1}${o1}`);
                b = parseInt(`${h2}${t2}${o2}`);
                op = '+';
            } else if (type === 3) { // 3. 받아올림 2번 덧셈
                let o1 = randomInt(1, 9), o2 = randomInt(10 - o1, 9);
                let t1 = randomInt(0, 9), t2 = randomInt(9 - t1, 9);
                let h1 = randomInt(1, 8), h2 = randomInt(1, 8 - h1);
                a = parseInt(`${h1}${t1}${o1}`);
                b = parseInt(`${h2}${t2}${o2}`);
                op = '+';
            } else if (type === 4) { // 4. 받아내림 없는 뺄셈
                let h1 = randomInt(2, 9), h2 = randomInt(1, h1);
                let t1 = randomInt(0, 9), t2 = randomInt(0, t1);
                let o1 = randomInt(0, 9), o2 = randomInt(0, o1);
                a = parseInt(`${h1}${t1}${o1}`);
                b = parseInt(`${h2}${t2}${o2}`);
                op = '-';
            } else if (type === 5) { // 5. 받아내림 있는 뺄셈 (1회이상)
                let isOnesBorrow = Math.random() < 0.5;
                let h1, h2, t1, t2, o1, o2;
                if (isOnesBorrow) {
                    o1 = randomInt(0, 8); o2 = randomInt(o1 + 1, 9);
                    t1 = randomInt(1, 9); t2 = randomInt(0, t1 - 1);
                    h1 = randomInt(2, 9); h2 = randomInt(1, h1 - 1);
                } else {
                    o1 = randomInt(0, 9); o2 = randomInt(0, o1);
                    t1 = randomInt(0, 8); t2 = randomInt(t1 + 1, 9);
                    h1 = randomInt(2, 9); h2 = randomInt(1, h1 - 1);
                }
                a = parseInt(`${h1}${t1}${o1}`);
                b = parseInt(`${h2}${t2}${o2}`);
                op = '-';
            }
            return { a, b, op };
        }

        // --- 4. Application Core --- //
        function initGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            for (let i = 0; i < STATE.splits; i++) {
                const pane = document.createElement('div');
                pane.className = 'pane';
                pane.innerHTML = `
                    <div class="math-wrapper">
                        <div class="pane-tools-top">
                            <button class="btn btn-cyan btn-newprob">새로운 문제</button>
                        </div>
                        <div class="math-problem">
                            <div class="num-row num-top"></div>
                            <div class="num-row num-bottom"></div>
                            <div class="line"></div>
                        </div>
                    </div>
                    <canvas class="drawing-canvas"></canvas>
                    <div class="pane-tools-bottom">
                        <div class="slider-container">
                            <span>위</span>
                            <input type="range" class="y-slider" min="0" max="100" value="50">
                            <span>아래</span>
                        </div>
                        <button class="btn btn-yellow btn-eraser">🧹 지우개 모드</button>
                    </div>
                `;
                container.appendChild(pane);

                const canvas = pane.querySelector('canvas');
                new MathBoard(canvas, pane);
            }
        }

        // Helper to wrap string into individual spans for rigid alignment
        function renderDigits(container, numberStr, includeOperator, operatorStr) {
            container.innerHTML = '';

            let opSpan = document.createElement('span');
            opSpan.className = 'operator ' + (includeOperator ? '' : 'invisible');
            opSpan.innerText = operatorStr || '+';
            container.appendChild(opSpan);

            let str = numberStr.toString();
            let pad = 3 - str.length;
            for (let i = 0; i < pad; i++) {
                let s = document.createElement('span');
                s.className = 'digit empty';
                container.appendChild(s);
            }
            for (let char of str) {
                let span = document.createElement('span');
                span.className = 'digit';
                span.innerText = char;
                container.appendChild(span);
            }
        }

        // Object managing individual pane logic
        class MathBoard {
            constructor(canvas, paneElement) {
                this.canvas = canvas;
                this.pane = paneElement;
                this.ctx = canvas.getContext('2d', { willReadFrequently: true });
                this.pointers = new Map();
                this.isEraser = false;

                this.mathWrapper = paneElement.querySelector('.math-wrapper');
                this.btnNew = paneElement.querySelector('.btn-newprob');
                this.btnEraser = paneElement.querySelector('.btn-eraser');
                this.ySlider = paneElement.querySelector('.y-slider');

                this.numTop = paneElement.querySelector('.num-top');
                this.numBottom = paneElement.querySelector('.num-bottom');

                // Keep canvas pixels matched with css bounds
                this.resizeObserver = new ResizeObserver(() => this.resize());
                this.resizeObserver.observe(this.canvas);

                this.btnEraser.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    this.isEraser = !this.isEraser;
                    if (this.isEraser) {
                        this.btnEraser.classList.add('eraser-active');
                        this.btnEraser.innerText = '🖍️ 펜 모드';
                    } else {
                        this.btnEraser.classList.remove('eraser-active');
                        this.btnEraser.innerText = '🧹 지우개 모드';
                    }
                });

                if (this.btnNew) {
                    this.btnNew.addEventListener('pointerdown', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        this.refreshProblem();
                    });
                }

                this.ySlider.addEventListener('input', (e) => {
                    // Dynamically adjust slider bounds based on split count to prevent clipping 
                    // while allowing maximum movement for smaller font sizes.
                    const bounds = {
                        1: { min: 35, max: 55 },
                        2: { min: 25, max: 65 },
                        3: { min: 20, max: 70 },
                        4: { min: 15, max: 75 },
                        5: { min: 15, max: 80 },
                        6: { min: 15, max: 80 }
                    };
                    let b = bounds[STATE.splits] || { min: 20, max: 80 };
                    let val = parseInt(e.target.value);
                    let topPercent = b.min + (val / 100) * (b.max - b.min);
                    this.mathWrapper.style.top = `${topPercent}%`;
                });

                this.bindEvents();
                setTimeout(() => this.refreshProblem(), 50);
            }

            resize() {
                const rect = this.canvas.getBoundingClientRect();
                let data = null;
                if (this.canvas.width > 0 && this.canvas.height > 0) {
                    try { data = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height); } catch (e) { }
                }

                this.canvas.width = rect.width;
                this.canvas.height = rect.height;

                if (data) this.ctx.putImageData(data, 0, 0);
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
            }

            refreshProblem() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                let p = generateMath(STATE.type);

                renderDigits(this.numTop, p.a, false, p.op);
                renderDigits(this.numBottom, p.b, true, p.op);

                // Reset eraser to normal pen
                this.isEraser = false;
                this.btnEraser.classList.remove('eraser-active');
                this.btnEraser.innerText = '🧹 지우개 모드';
            }

            bindEvents() {
                this.canvas.addEventListener('pointerdown', this.onPointerDown.bind(this));
                this.canvas.addEventListener('pointermove', this.onPointerMove.bind(this));
                this.canvas.addEventListener('pointerup', this.onPointerUp.bind(this));
                this.canvas.addEventListener('pointercancel', this.onPointerUp.bind(this));
                this.pane.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

                // Prevent pointer events on bottom tools from drawing
                const toolsBottom = this.pane.querySelector('.pane-tools-bottom');
                toolsBottom.addEventListener('pointerdown', e => e.stopPropagation());
                toolsBottom.addEventListener('touchstart', e => e.stopPropagation());

                // Allow touch clicks for the top '새로운 문제' button
                if (this.btnNew) {
                    this.btnNew.addEventListener('pointerdown', e => e.stopPropagation());
                    this.btnNew.addEventListener('touchstart', e => e.stopPropagation());
                }
            }

            onPointerDown(e) {
                e.preventDefault();
                if (e.pointerType === 'mouse' && e.button !== 0) return;

                this.canvas.setPointerCapture(e.pointerId);
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                this.pointers.set(e.pointerId, { x, y });
            }

            onPointerMove(e) {
                if (!this.pointers.has(e.pointerId)) return;
                e.preventDefault();

                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const last = this.pointers.get(e.pointerId);

                this.ctx.beginPath();
                this.ctx.moveTo(last.x, last.y);
                this.ctx.lineTo(x, y);

                if (this.isEraser) {
                    this.ctx.globalCompositeOperation = 'destination-out';
                    this.ctx.lineWidth = 60; // Thicker eraser for little kids
                    this.ctx.strokeStyle = 'rgba(0,0,0,1)';
                } else {
                    this.ctx.globalCompositeOperation = 'source-over';
                    this.ctx.lineWidth = 4;
                    this.ctx.strokeStyle = '#222'; // Dark ink
                }

                this.ctx.stroke();
                this.pointers.set(e.pointerId, { x, y });
            }

            onPointerUp(e) {
                if (this.pointers.has(e.pointerId)) {
                    this.pointers.delete(e.pointerId);
                    this.canvas.releasePointerCapture(e.pointerId);
                }
            }
        }
    </script>
</body>

</html>
